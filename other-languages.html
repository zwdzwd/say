const raw = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decrypt(pass) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass),
    "PBKDF2", false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits(
    {name:"PBKDF2", salt:raw(SALT), iterations:ITERS, hash:"SHA-256"}, km, 256);
  const key = await crypto.subtle.importKey("raw", bits, {name:"AES-CBC"}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-CBC", iv:raw(IV)}, key, raw(CT));
  return new TextDecoder().decode(pt);
}
async function tryPass(pass, remember) {
  try {
    const doc = await decrypt(pass);
    if (remember) sessionStorage.setItem("ra_pass", pass);
    document.open(); document.write(doc); document.close();
  } catch (e) {
    sessionStorage.removeItem("ra_pass");
    document.getElementById("err").textContent = "Wrong passcode";
  }
}
addEventListener("DOMContentLoaded", () => {
  const cached = sessionStorage.getItem("ra_pass");
  if (cached) tryPass(cached, false);
  document.getElementById("f").addEventListener("submit", e => {
    e.preventDefault(); tryPass(document.getElementById("p").value, true);
  });
});
